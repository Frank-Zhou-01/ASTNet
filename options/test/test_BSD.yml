name: BSD_test
model_type: VideoRecurrentModel
scale: 1
num_gpu: 1  # set num_gpu: 0 for cpu mode
manual_seed: 0

datasets:
  test_1:  # the 1st test dataset
    name: BSD
    type: VideoRecurrentSplitClipsTestDataset
    dataroot_gt: /root/BSD/test/gt
    dataroot_lq: /root/BSD/test/blur
    data_augment: -1
    cache_data: False
    io_backend:
      type: disk

    num_frame: 30
    num_overlap: 0

# network structures
network_g:
  type: ASTNet_arch
  channels: 64
  transformer_list: [4, 6]
  head_list: [4, 8]
  fusion_blocks: 15
  refinement_blocks: 5
  win_size: [8, 8]

# path
path:
  pretrain_network_g:
  strict_load_g: true

# validation settingsa
val:
  save_img: true
  flip_seq: false
  suffix: ~  # add suffix to saved images, if None, use exp name

  metrics:
    psnr:
      type: calculate_psnr
      crop_border: 0
    ssim:
      type: calculate_ssim
      crop_border: 0

